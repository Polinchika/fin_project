services:
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend/app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ocr_db
      - OCR_SERVICE_URL=http://ocr:7070/ocr
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - ocr

  ocr:
    image: ocr-dev
    build: ./ocr
    working_dir: /app
    volumes:
      - ./ocr:/app
    command: python app.py
    ports:
      - "7070:7070"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Альтернативный вариант для старых версий
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1

  mongodb:
    image: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data: